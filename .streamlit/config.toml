[browser]
gatherUsageStats = false

# Production (Render/Docker): disable dev file watcher — saves CPU/RAM and avoids
# watchdog RuntimeError on large repos.
[server]
fileWatcherType = "none"
headless = true

# Single entry (app.py) + custom bottom nav — hide Streamlit multipage sidebar UI.
[client]
showSidebarNavigation = false

# Launch: always use light theme (ignore OS/browser dark mode for Streamlit chrome).
[theme]
base = "light"
primaryColor = "#0F6E56"
backgroundColor = "#F8FAF9"
secondaryBackgroundColor = "#FFFFFF"
textColor = "#111827"
font = "sans serif"
